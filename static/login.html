<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OzKiz Studio — 로그인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4ff;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 32px rgba(0,0,0,.1);
    padding: 48px 40px;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .logo { font-size: 36px; margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 6px; }
  p { font-size: 14px; color: #666; margin-bottom: 32px; }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    padding: 12px 20px;
    background: #4285f4;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background .15s;
  }
  .btn-google:hover { background: #3367d6; }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    background: #fff0f0;
    border: 1px solid #fcc;
    border-radius: 8px;
    color: #c00;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">✂️</div>
  <h1>OzKiz Studio</h1>
  <p>@openhan.kr 계정으로 로그인하세요</p>
  <a href="/api/auth/google" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 48 48" fill="none">
      <path fill="#EA4335" d="M24 9.5c3.55 0 6.74 1.22 9.25 3.23l6.88-6.88C35.93 2.35 30.33 0 24 0 14.67 0 6.71 5.43 2.85 13.35l8.03 6.23C12.73 13.47 17.94 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-8.03-6.23C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.5 10.82l8.03-6.23z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.06 0-11.27-3.97-13.12-9.58l-8.03 6.23C6.71 42.57 14.67 48 24 48z"/>
    </svg>
    Google로 로그인
  </a>
  <div id="err" class="error" style="display:none"></div>
</div>
<script>
const p = new URLSearchParams(location.search);
const err = p.get('error');
if (err) {
  const m = {auth_failed:'인증에 실패했습니다.', no_token:'토큰을 받지 못했습니다.', domain:'@openhan.kr 계정만 허용됩니다.'};
  document.getElementById('err').textContent = m[err] || '로그인 오류: ' + err;
  document.getElementById('err').style.display = 'block';
}
</script>
</body>
</html>
